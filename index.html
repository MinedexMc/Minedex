<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minedex</title>

<style>
:root {
  --bg: #0f2027;
  --card: rgba(255,255,255,0.05);
  --text: white;
  --secondary: #222;
  --primary: #00ccff;
}

.light {
  --bg: #f4f4f4;
  --card: rgba(0,0,0,0.05);
  --text: black;
  --secondary: #ddd;
  --primary: #00aaff;
}

body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background: var(--bg);
  color: var(--text);
  transition:0.3s;
}

/* NAV */
.nav {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:var(--card);
  backdrop-filter:blur(10px);
}

.logo {color:#00ccaa;font-weight:bold;}
.toggle {cursor:pointer; transition:0.3s;}
.toggle:hover {transform:scale(1.2);}

/* HERO */
.hero {
  text-align:center;
  padding:50px 20px;
  animation:fadeUp 1s ease;
}

.hero h1 {font-size:32px;}
.hero button {
  margin-top:25px;
  padding:14px 25px;
  border:none;
  border-radius:12px;
  background:var(--primary);
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}
.hero button:hover {transform:scale(1.05);}

/* APP */
.container {max-width:500px;margin:auto;padding:20px;}

.card {
  background:var(--card);
  padding:15px;
  border-radius:15px;
  margin-top:15px;
  animation:fadeUp 0.7s ease;
}

/* IDEA */
.idea {
  background:var(--secondary);
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  transition:0.2s, box-shadow 0.2s;
}
.idea:hover {
  transform:scale(1.02);
  box-shadow:0 0 15px var(--primary);
}

.row {display:flex; gap:10px; margin-top:5px;}
button {flex:1; padding:8px; border:none; border-radius:8px; cursor:pointer; transition:0.2s;}
button:hover {transform:scale(1.05);}

/* LOGIN */
.login {text-align:center;margin-top:60px;}
input {padding:10px;width:80%;margin-top:10px;border-radius:8px;border:none;}

/* FOOTER */
.footer {text-align:center;margin:30px 0;font-size:12px;color:#888;}

/* ANIMATIONS */
@keyframes fadeUp {from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>

<body>

<div class="nav">
  <div class="logo">🎮 Minedex</div>
  <div>
    <span class="toggle" onclick="toggleTheme()">🌙</span>
    <span id="userDisplay"></span>
  </div>
</div>

<!-- LOGIN -->
<div id="loginPage" class="login">
  <h2>Enter your name</h2>
  <input id="username">
  <br>
  <button class="primary" onclick="login()">Start</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="hero">
  <h1>Generate Minecraft Ideas</h1>
  <button class="primary" onclick="generateIdeas()">Generate</button>
</div>

<div class="container">
<div class="card"><h3>Ideas</h3><div id="ideas"></div></div>
<div class="card"><h3>Saved</h3><div id="saved"></div></div>
<div class="card"><h3>Trending</h3><div id="trending"></div></div>
</div>

</div>

<div class="footer">© 2026 Minedex</div>

<!-- SOUNDS -->
<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
<audio id="saveSound" src="https://www.soundjay.com/buttons/sounds/button-09.mp3"></audio>

<script>
/* THEME */
let theme = localStorage.getItem("theme");
if(theme==="light") document.body.classList.add("light");

function toggleTheme(){
  document.body.classList.toggle("light");
  localStorage.setItem("theme",document.body.classList.contains("light")?"light":"dark");
}

/* LOGIN */
let user = localStorage.getItem("user");
if(user) startApp();

function login(){
  const input=document.getElementById("username");
  user=input.value.trim();
  if(!user) return alert("Enter name");
  localStorage.setItem("user",user);
  startApp();
}

function startApp(){
  document.getElementById("loginPage").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("userDisplay").innerText="👤 "+user;
}

/* IDEA SYSTEM */
const starters=["Minecraft but","I tried","100 Days"];
const twists=["everything is random","no jumping","1 heart","OP mobs"];
const goals=["beat the game","survive","win"];

function makeIdea(){
  return `${starters[Math.random()*starters.length|0]} ${twists[Math.random()*twists.length|0]} to ${goals[Math.random()*goals.length|0]}`;
}

function playClick(){
  document.getElementById("clickSound").currentTime=0;
  document.getElementById("clickSound").play();
}

function playSave(){
  document.getElementById("saveSound").currentTime=0;
  document.getElementById("saveSound").play();
}

function generateIdeas(){
  playClick();
  const box=document.getElementById("ideas");
  box.innerHTML="";
  for(let i=0;i<5;i++){
    const idea=makeIdea();
    box.innerHTML += `
    <div class="idea">
      ${idea}
      <div class="row">
        <button onclick="saveIdea('${idea}')">⭐</button>
        <button onclick="likeIdea('${idea}')">🔥</button>
      </div>
    </div>`;
  }
}

/* SAVE */
let saved=JSON.parse(localStorage.getItem("saved"))||[];

function saveIdea(i){
  saved.push(i);
  localStorage.setItem("saved",JSON.stringify(saved));
  renderSaved();
  playSave();
}

function renderSaved(){
  document.getElementById("saved").innerHTML=
  saved.map((i,idx)=>`<div class="idea">${i}<button onclick="removeIdea(${idx})">❌</button></div>`).join("");
}

function removeIdea(i){
  saved.splice(i,1);
  localStorage.setItem("saved",JSON.stringify(saved));
  renderSaved();
}

/* TRENDING */
let trending=[];
function likeIdea(i){
  trending.push(i);
  renderTrending();
}
function renderTrending(){
  document.getElementById("trending").innerHTML=
  trending.map(i=>`<div class="idea">${i}</div>`).join("");
}

renderSaved();
</script>
</body>
</html>
