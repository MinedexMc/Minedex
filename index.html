<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minedex</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #1f4037, #0f2027);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 420px;
      padding: 25px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      box-shadow: 0 0 30px rgba(0,255,150,0.2);
      text-align: center;
      animation: fadeIn 1s ease;
    }

    h1 {
      font-size: 28px;
      color: #00ffcc;
      margin-bottom: 5px;
    }

    .tagline {
      font-size: 14px;
      color: #bbb;
      margin-bottom: 20px;
    }

    select, button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      margin-top: 10px;
      font-size: 15px;
    }

    select {
      background: #222;
      color: white;
    }

    button {
      background: linear-gradient(45deg, #00ffcc, #00ccff);
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    #idea {
      margin-top: 20px;
      padding: 18px;
      border-radius: 12px;
      background: rgba(0,0,0,0.6);
      font-size: 16px;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s;
    }

    .copy-btn {
      background: #333;
    }

    .copy-btn:hover {
      background: #555;
    }

    .secondary-btn {
      background: #444;
    }

    .secondary-btn:hover {
      background: #666;
    }

    #savedList {
      margin-top: 15px;
      font-size: 14px;
      text-align: left;
      max-height: 150px;
      overflow-y: auto;
    }

    .footer {
      font-size: 12px;
      color: gray;
      margin-top: 20px;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🎮 Minedex</h1>
  <div class="tagline">Never run out of Minecraft ideas</div>

  <select id="category">
    <option value="all">All</option>
    <option value="hardcore">Hardcore</option>
    <option value="funny">Funny</option>
    <option value="challenge">Challenge</option>
    <option value="build">Build</option>
  </select>

  <button onclick="generateIdea()">🎲 Generate Idea</button>

  <div id="idea">Click to generate your first idea</div>

  <button class="copy-btn" onclick="copyIdea()">📋 Copy Idea</button>
  <button class="secondary-btn" onclick="saveIdea()">⭐ Save Idea</button>
  <button class="secondary-btn" onclick="showSaved()">📜 View Saved</button>
  <button class="secondary-btn" onclick="clearSaved()">🧹 Clear Saved</button>

  <div id="savedList"></div>

  <div class="footer">© 2026 Minedex</div>
</div>

<!-- SOUND -->
<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<script>
  const ideas = {
    hardcore: [
      "Survive 100 Days in Hardcore with 1 Heart",
      "Hardcore but no armor allowed"
    ],
    funny: [
      "Minecraft but I can't stop jumping",
      "Minecraft but everything is upside down"
    ],
    challenge: [
      "Beat Minecraft using only wooden tools",
      "Speedrun but I can't touch grass"
    ],
    build: [
      "Build the safest house ever",
      "Build an underground secret base"
    ]
  };

  const starters = ["Minecraft but", "I tried", "Can I", "Surviving", "100 Days"];
  const twists = ["everything is random", "mobs are OP", "I can't touch grass", "with only 1 heart", "in a tiny world"];
  const goals = ["beat the game", "build a mega base", "survive", "escape", "win"];

  function generateIdea() {
    document.getElementById("clickSound").play();

    const category = document.getElementById("category").value;
    let idea;

    if (category === "all") {
      const s = starters[Math.floor(Math.random() * starters.length)];
      const t = twists[Math.floor(Math.random() * twists.length)];
      const g = goals[Math.floor(Math.random() * goals.length)];
      idea = `${s} ${t} to ${g}`;
    } else {
      const arr = ideas[category];
      idea = arr[Math.floor(Math.random() * arr.length)];
    }

    document.getElementById("idea").innerText = idea;
  }

  function copyIdea() {
    const text = document.getElementById("idea").innerText;

    if (text.includes("Click")) {
      alert("Generate an idea first!");
      return;
    }

    navigator.clipboard.writeText(text);
    alert("Copied!");
  }

  let savedIdeas = JSON.parse(localStorage.getItem("ideas")) || [];

  function saveIdea() {
    const idea = document.getElementById("idea").innerText;

    if (idea.includes("Click")) {
      alert("Generate an idea first!");
      return;
    }

    savedIdeas.push(idea);
    localStorage.setItem("ideas", JSON.stringify(savedIdeas));
    alert("Idea saved ⭐");
  }

  function showSaved() {
    const list = document.getElementById("savedList");

    if (savedIdeas.length === 0) {
      list.innerHTML = "No saved ideas yet.";
      return;
    }

    list.innerHTML = savedIdeas.map(i => `• ${i}`).join("<br>");
  }

  function clearSaved() {
    savedIdeas = [];
    localStorage.removeItem("ideas");
    document.getElementById("savedList").innerHTML = "";
    alert("Cleared!");
  }
</script>

</body>
</html>
