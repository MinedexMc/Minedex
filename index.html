<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minedex</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .container {
      max-width: 500px;
      width: 100%;
      text-align: center;
      background: rgba(0,0,0,0.4);
      padding: 25px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      animation: fadeIn 1s ease;
    }

    h1 {
      color: #00ffcc;
    }

    select, button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      margin-top: 12px;
      font-size: 16px;
    }

    button {
      background: #00ffcc;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.1s ease;
    }

    button:active {
      transform: scale(0.95);
    }

    #idea {
      margin-top: 20px;
      padding: 20px;
      border-radius: 12px;
      background: rgba(0,0,0,0.6);
      min-height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      opacity: 0;
      transform: scale(0.9);
      transition: all 0.3s ease;
    }

    #idea.show {
      opacity: 1;
      transform: scale(1);
    }

    .copy-btn {
      background: #333;
    }

    .copy-btn:hover {
      background: #555;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🎮 Minedex</h1>
  <p>Unlimited Minecraft Ideas</p>

  <select id="category">
    <option value="hardcore">Hardcore</option>
    <option value="funny">Funny</option>
    <option value="challenge">Challenge</option>
    <option value="build">Build</option>
  </select>

  <button onclick="generateIdea()">🎲 Generate Idea</button>

  <div id="idea">Your idea will appear here...</div>

  <button class="copy-btn" onclick="copyIdea()">📋 Copy Idea</button>

  <p style="font-size:12px; color:gray; margin-top:25px;">
    © 2026 Minedex
  </p>
</div>

<!-- SOUND -->
<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<script>
  const starters = ["Minecraft but", "I tried", "Can I", "Surviving", "100 Days"];
  const twists = ["everything is random", "mobs are OP", "I can't touch grass", "with only 1 heart", "in a tiny world"];
  const goals = ["beat the game", "build a mega base", "survive", "escape", "win"];

  function generateIdea() {
    const ideaBox = document.getElementById("idea");

    // Play sound
    document.getElementById("clickSound").play();

    // Generate idea
    const s = starters[Math.floor(Math.random() * starters.length)];
    const t = twists[Math.floor(Math.random() * twists.length)];
    const g = goals[Math.floor(Math.random() * goals.length)];

    const newIdea = `${s} ${t} to ${g}`;

    // Animate
    ideaBox.classList.remove("show");

    setTimeout(() => {
      ideaBox.innerText = newIdea;
      ideaBox.classList.add("show");
    }, 150);
  }

  function copyIdea() {
    const text = document.getElementById("idea").innerText;

    if (text === "Your idea will appear here...") {
      alert("Generate an idea first!");
      return;
    }

    navigator.clipboard.writeText(text);
    alert("Copied!");
  }
</script>

</body>
</html>
